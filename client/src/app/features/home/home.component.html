<main style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; width: 100%; min-height: calc(100vh - 182px);">
    <app-date-time />
    <h1 class="gradient-text">{{ title }}</h1>
    <div class="mt-3">
        <app-counter />
    </div>
    <div
        style="height: 1px; width: 20%; margin-top: 1.5rem; margin-bottom: 1.5rem; background: linear-gradient(to right, #f00, #f0f, #800080);"
        role="separator"
        aria-label="Divider"
    ></div>

    <div style="display: flex; align-items: center; gap: 1rem;">
        <button mat-flat-button [routerLink]="'/dashboard'">Dashboard</button>
        <button mat-flat-button [routerLink]="'/profile'">Profile</button>
    </div>
</main>
